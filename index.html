<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Restaurant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #faf7f2;
      color: #333;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: #2c2c2c;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .hero {
      padding: 40px 20px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #c59d5f;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .section {
      padding: 40px 20px;
    }

    footer {
      padding: 20px;
      background: #2c2c2c;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<header>
  <h1>Restaurant Marea</h1>
  <p>Mediterrane Küche in Köln</p>
</header>

<div class="hero">
  <h2>Willkommen bei uns</h2>
  <p>Genießen Sie frische Gerichte und eine entspannte Atmosphäre.</p>

  <a href="tel:+49123456789" class="btn">📞 Anrufen</a>
  <a href="#menu" class="btn">🍽 Speisekarte</a>
</div>

<div id="menu" class="section">
  <h2>Speisekarte</h2>
  <p>🍝 Pasta – 12€</p>
  <p>🍕 Pizza – 10€</p>
  <p>🥗 Salat – 8€</p>
</div>

<div class="section">
  <h2>Öffnungszeiten</h2>
  <p>Mo–So: 17:00 – 23:00</p>
</div>

<footer>
  <p>📍 Musterstraße 1, Köln</p>
  <p>📞 +49 123 456789</p>
</footer>

</body>
</html>
