<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bewerten | Clauß Flammkuchen</title>

  <style>
    :root {
      --bg: #f6efe5;
      --card: #fffaf2;
      --text: #1f1f1f;
      --muted: #6f6760;
      --rose: #c98f97;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(201, 143, 151, 0.16), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: 100%;
      max-width: 420px;
      padding: 30px 24px 30px;
      border-radius: 30px;
      background: var(--card);
      text-align: center;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.08);
    }

    .brand {
      margin-bottom: 20px;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .button {
      display: block;
      width: 100%;
      padding: 17px 20px;
      border-radius: 999px;
      background: var(--text);
      color: white;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 34px;
    }

    .button:active {
      transform: scale(0.98);
    }

    .dice-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 17px;
      border-radius: 13px;
      border: 2px solid var(--text);
      transform: rotate(-7deg);
      display: grid;
      place-items: center;
      background: var(--card);
      color: var(--text);
      font-size: 1.95rem;
      line-height: 1;
      font-weight: 850;
      box-shadow: 0 8px 0 rgba(201, 143, 151, 0.16);
    }

    .dice-icon span {
      display: block;
      margin-top: -2px;
    }

    h1 {
      margin: 0 0 18px;
      line-height: 1.03;
      letter-spacing: -0.035em;
      color: var(--text);
    }

    h1 span {
      display: block;
    }

    h1 .top {
      font-size: clamp(2rem, 9.5vw, 3rem);
      font-weight: 750;
    }

    h1 .bottom {
      margin-top: 2px;
      font-size: clamp(2.45rem, 12vw, 3.75rem);
      font-weight: 850;
    }

    p {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .prizes {
      margin: 20px 0 22px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .prizes span {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(201, 143, 151, 0.16);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 650;
      white-space: nowrap;
    }

    .qr-note {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      font-size: 1rem;
      line-height: 1.5;
    }

    .qr-note strong {
      color: var(--text);
    }
  </style>
</head>

<body>
  <main>
    <div class="brand">Clauß Flammkuchen</div>

    <a
      class="button"
      href="https://g.page/r/CVeaYjjRlCpnEBM/review"
      target="_blank"
      rel="noopener"
    >
      Auf Google bewerten
    </a>

    <div class="dice-icon" aria-hidden="true">
      <span>?</span>
    </div>

    <h1>
      <span class="top">Freigetränk</span>
      <span class="bottom">würfeln!</span>
    </h1>

    <p>Auf dem Würfel warten:</p>

    <div class="prizes">
      <span>Spritzgetränk</span>
      <span>Hauslimonade</span>
      <span>0,3 Getränk</span>
      <span>Shot</span>
      <span>Espresso</span>
    </div>

    <p class="qr-note">
      <strong>QR-Code gewürfelt?</strong><br>
      Danke fürs Scannen! Bewerte uns, wenn du magst — und würfle einfach nochmal.
    </p>
  </main>
</body>
</html>
