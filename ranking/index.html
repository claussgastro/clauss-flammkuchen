<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flammkuchen-Ranking</title>
  <style>
    :root{--bg:#f5efe5;--card:#fffaf2;--ink:#171514;--muted:#706862;--line:rgba(23,21,20,.15);--rose:#d8a0aa;--shadow:0 18px 45px rgba(23,21,20,.1);--radius:22px}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;color:var(--ink);font-family:Georgia,'Times New Roman',serif;background:radial-gradient(circle at top left,rgba(216,160,170,.22),transparent 34rem),linear-gradient(180deg,#f8f1e8,var(--bg))}
    button{font:inherit;-webkit-tap-highlight-color:transparent;cursor:pointer}
    button:disabled{opacity:.35;cursor:not-allowed}
    .app{width:min(920px,calc(100% - 24px));margin:0 auto;padding:22px 0 44px}
    .hero,.card{border:1px solid var(--line);background:rgba(255,250,242,.78);border-radius:30px;box-shadow:var(--shadow)}
    .hero{padding:clamp(24px,5vw,44px);margin-bottom:16px}
    .card{padding:clamp(18px,4vw,28px);margin-bottom:16px;border-radius:var(--radius);box-shadow:0 10px 30px rgba(23,21,20,.06)}
    h1,h2,h3,p{margin-top:0}
    h1{font-size:clamp(30px,5.2vw,52px);line-height:.98;letter-spacing:-.04em;margin-bottom:10px}
    h2{font-size:clamp(25px,4.5vw,40px);line-height:1;margin-bottom:14px;letter-spacing:-.03em}
    h3{font-size:21px;margin:24px 0 10px}
    .lead,.muted,.pill,.meta,.msg,.btn,.footer{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .lead{font-size:clamp(17px,3vw,21px);line-height:1.4;margin:0;color:#2b2825}
    .muted,.meta{color:var(--muted)}
    .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .pill{padding:8px 12px;border-radius:999px;background:rgba(216,160,170,.22);font-weight:800;white-space:nowrap}
    .slots,.results{display:grid;gap:10px}
    .slot,.result,.menu-item{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.45)}
    .slot{display:grid;grid-template-columns:40px 34px minmax(0,1fr) auto;gap:8px;align-items:center;min-height:70px;padding:10px;transition:background .12s,transform .12s,opacity .12s}
    .slot.empty{grid-template-columns:34px minmax(0,1fr);border-style:dashed;background:rgba(255,255,255,.28)}
    .slot.dragging{opacity:.72;transform:scale(.995);background:rgba(216,160,170,.16);outline:2px solid rgba(216,160,170,.55)}
    .handle,.num,.small,.add,.submit{display:inline-grid;place-items:center;border-radius:999px}
    .handle{width:40px;height:44px;border:1px solid var(--line);background:rgba(255,250,242,.85);color:var(--muted);font-size:20px;font-weight:900;touch-action:none;cursor:grab}
    .num{width:34px;height:34px;background:var(--ink);color:var(--card);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:900}
    .name{min-width:0;font-size:18px;font-weight:700;line-height:1.12;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .empty .name{white-space:normal;overflow:visible;text-overflow:clip}
    .meta{font-size:13px;margin-top:3px}
    .actions{display:flex;gap:7px}
    .small,.add,.submit{border:1px solid var(--ink);background:transparent;color:var(--ink);font-weight:850}
    .small{min-width:44px;height:44px;padding:0 10px;font-size:17px}
    .remove{font-size:24px;padding:0}
    .add{min-width:100px;padding:10px 12px;background:var(--card);font-size:14px;white-space:nowrap}
    .submit{width:100%;margin-top:14px;padding:15px 18px;background:var(--ink);color:var(--card);font-size:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,240px),1fr));gap:10px}
    .menu-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:13px}
    .menu-item.chosen{outline:2px solid rgba(216,160,170,.7);background:rgba(216,160,170,.11)}
    .msg{display:none;margin-bottom:14px;padding:13px 15px;border:1px solid rgba(216,160,170,.45);border-radius:16px;background:rgba(216,160,170,.18);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.4}
    .msg.show{display:block}
    .result{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px}
    .points{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:850;white-space:nowrap}
    .hidden{display:none!important}
    @media(max-width:620px){.app{width:min(100% - 20px,920px);padding-top:14px}.bar{align-items:flex-start}.slot{grid-template-columns:36px 30px minmax(0,1fr) auto;gap:6px;min-height:66px;padding:9px}.slot.empty{grid-template-columns:30px minmax(0,1fr)}.handle{width:36px;height:40px;font-size:18px}.num{width:30px;height:30px;font-size:13px}.name{font-size:17px}.meta{font-size:12px}.actions{gap:5px}.small{min-width:40px;height:40px;padding:0 8px}.add{min-width:94px}.result{grid-template-columns:auto 1fr}.points{grid-column:1/-1;margin-left:42px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Dein Flammkuchen-Ranking</h1>
      <p class="lead">Wähle deine Top 5 und sieh danach das Gäste-Ranking.</p>
    </header>

    <div id="msg" class="msg"></div>

    <section id="vote" class="card">
      <div class="bar"><h2>Top 5</h2><span id="count" class="pill">0/5</span></div>
      <div id="slots" class="slots"></div>
      <button id="submit" class="submit" type="button" disabled>Absenden</button>
    </section>

    <section id="menu" class="card">
      <h2>Flammkuchen</h2>
      <div id="groups"></div>
    </section>

    <section id="results" class="card hidden">
      <h2>Gäste-Ranking</h2>
      <p id="summary" class="muted"></p>
      <div id="resultList" class="results"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://ssgmbeeezjznvvodhend.supabase.co';
    const SUPABASE_KEY='sb_publishable_JQke52YXReRCm_sNDXQvWg_-58fYP_X';
    const TOP=5,RESULTS=10,BLOCK=6*60*60*1000;
    const TABLE=new URLSearchParams(location.search).get('tisch')||null;
    const SESSION_KEY='clauss_flammkuchen_ranking_session_id_top5_v2';
    const VOTED_KEY='clauss_flammkuchen_ranking_voted_at_top5_v2';

    const MENU=[
      ['Elsässer','Klassisch'],['Elsässer Käse','Klassisch'],['Elsässer Knoblauch','Klassisch'],['Elsässer Chili','Klassisch'],['Elsässer Lauch','Klassisch'],['Münster','Klassisch'],
      ['Champignon','Gemüse & Mediterran'],['Caprese','Gemüse & Mediterran'],['Gemüse','Gemüse & Mediterran'],['Mediterran','Gemüse & Mediterran'],['Feta Spinat','Gemüse & Mediterran'],['Feta Peperoni','Gemüse & Mediterran'],
      ['Schinken Champignon','Deftig & Herzhaft'],['Arrabiata','Deftig & Herzhaft'],['Hawaii','Deftig & Herzhaft'],['Raclette','Deftig & Herzhaft'],['Thunfisch','Deftig & Herzhaft'],['Dattel Speck','Deftig & Herzhaft'],['Dattel Feta','Deftig & Herzhaft'],['Sucuk','Deftig & Herzhaft'],
      ['Camembert','Fein & Besonders'],['Ziegenkäse Honig','Fein & Besonders'],['Lachs Spinat','Fein & Besonders'],['Lachs Feldsalat','Fein & Besonders'],['Lachs Feta','Fein & Besonders'],['Avocado','Fein & Besonders'],['Maultasche klassisch','Fein & Besonders'],['Maultasche vegetarisch','Fein & Besonders'],
      ['Apfel Zimt','Süße Klassiker'],['Banane Nutella','Süße Klassiker'],['Biscoff','Süße Klassiker'],['Rote Beeren','Fruchtig & Süß'],['Himbeere Oreo','Fruchtig & Süß'],['Heiße Liebe','Fruchtig & Süß']
    ];

    const $=id=>document.getElementById(id);
    const e={vote:$('vote'),menu:$('menu'),msg:$('msg'),count:$('count'),slots:$('slots'),groups:$('groups'),submit:$('submit'),results:$('results'),summary:$('summary'),resultList:$('resultList')};
    let db=null,all=MENU.map((m,i)=>({id:i+1,name:m[0],category:m[1],sort_order:(i+1)*10})),pick=[],busy=false,dragId=null;

    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    const item=id=>all.find(x=>x.id===id);
    const message=t=>{e.msg.textContent=t;e.msg.classList.toggle('show',!!t)};
    const session=()=>{let id=localStorage.getItem(SESSION_KEY);if(!id){id=crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random();localStorage.setItem(SESSION_KEY,id)}return id};
    const niceError=err=>String(err?.message||err||'').includes('fetch')?'Verbindung zur Abstimmung nicht möglich. Bitte später nochmal probieren.':(err?.message||'Das hat nicht geklappt.');

    function renderSlots(){
      e.count.textContent=pick.length+'/'+TOP;
      e.submit.disabled=pick.length!==TOP||busy;
      e.slots.innerHTML=Array.from({length:TOP},(_,i)=>{
        const f=item(pick[i]);
        if(!f)return `<div class="slot empty"><span class="num">${i+1}</span><div class="name">Platz ${i+1} ist noch frei</div></div>`;
        return `<div class="slot ${dragId===f.id?'dragging':''}" data-id="${f.id}">
          <button class="handle" type="button" data-drag="${f.id}" aria-label="Sortieren">☰</button>
          <span class="num">${i+1}</span>
          <div><div class="name">${esc(f.name)}</div><div class="meta">${esc(f.category)}</div></div>
          <div class="actions">
            <button class="small" type="button" data-act="up" data-id="${f.id}" ${i===0?'disabled':''}>↑</button>
            <button class="small" type="button" data-act="down" data-id="${f.id}" ${i===pick.length-1?'disabled':''}>↓</button>
            <button class="small remove" type="button" data-act="remove" data-id="${f.id}">×</button>
          </div>
        </div>`;
      }).join('');
    }

    function renderMenu(){
      const groups=new Map();
      all.forEach(f=>{if(!groups.has(f.category))groups.set(f.category,[]);groups.get(f.category).push(f)});
      e.groups.innerHTML=[...groups].map(([cat,rows])=>`<section><h3>${esc(cat)}</h3><div class="grid">${rows.map(f=>{
        const chosen=pick.includes(f.id),disabled=!chosen&&pick.length>=TOP;
        return `<div class="menu-item ${chosen?'chosen':''}"><div><div class="name">${esc(f.name)}</div></div><button class="add" type="button" data-act="${chosen?'remove':'add'}" data-id="${f.id}" ${disabled?'disabled':''}>${chosen?'Gewählt':'Auswählen'}</button></div>`;
      }).join('')}</div></section>`).join('');
    }

    function render(keepScroll=false){const y=scrollY;renderSlots();renderMenu();if(keepScroll)requestAnimationFrame(()=>scrollTo(0,y))}
    function add(id){if(pick.includes(id))return;if(pick.length>=TOP)return message('Du hast schon 5 Flammkuchen gewählt.');message('');pick.push(id);render(true)}
    function remove(id){message('');pick=pick.filter(x=>x!==id);render(true)}
    function move(id,dir){const i=pick.indexOf(id),j=i+dir;if(i<0||j<0||j>=pick.length)return;[pick[i],pick[j]]=[pick[j],pick[i]];renderSlots()}
    function moveTo(id,to){const from=pick.indexOf(id);if(from<0)return;const copy=pick.slice(),x=copy.splice(from,1)[0];if(to>from)to--;to=Math.max(0,Math.min(to,copy.length));if(to===from)return;copy.splice(to,0,x);pick=copy;renderSlots()}

    function startDrag(ev){const h=ev.target.closest('[data-drag]');if(!h||ev.pointerType==='mouse'&&ev.button!==0)return;dragId=Number(h.dataset.drag);ev.preventDefault();renderSlots();document.addEventListener('pointermove',drag,{passive:false});document.addEventListener('pointerup',stopDrag);document.addEventListener('pointercancel',stopDrag)}
    function drag(ev){if(!dragId)return;ev.preventDefault();const row=document.elementFromPoint(ev.clientX,ev.clientY)?.closest('.slot[data-id]');if(!row||!e.slots.contains(row))return;const over=Number(row.dataset.id);if(!over||over===dragId)return;const r=row.getBoundingClientRect();moveTo(dragId,pick.indexOf(over)+(ev.clientY>r.top+r.height/2?1:0))}
    function stopDrag(){dragId=null;document.removeEventListener('pointermove',drag);document.removeEventListener('pointerup',stopDrag);document.removeEventListener('pointercancel',stopDrag);renderSlots()}

    async function syncMenuIds(){
      if(!db)return;
      try{
        const {data,error}=await db.rpc('get_flammkuchen_ranking',{p_limit:50});
        if(error||!data?.length)return;
        const selectedNames=pick.map(id=>item(id)?.name).filter(Boolean);
        const byName=new Map(data.map(r=>[r.name,r]));
        all=all.map(f=>{const r=byName.get(f.name);return r?{...f,id:r.flammkuchen_id,category:r.category}:f});
        pick=selectedNames.map(name=>all.find(f=>f.name===name)?.id).filter(Boolean);
        render();
      }catch(_){/* Die feste Liste bleibt sichtbar. */}
    }

    async function loadResults(){
      if(!db)throw new Error('Supabase konnte nicht geladen werden.');
      const {data,error}=await db.rpc('get_flammkuchen_ranking',{p_limit:RESULTS});
      if(error)throw error;
      const rows=data||[],total=rows[0]?.total_submissions||0;
      e.summary.textContent=total?`${total} Abstimmung${total===1?'':'en'} bisher.`:'Noch keine Abstimmungen.';
      e.resultList.innerHTML=rows.map(r=>`<div class="result"><span class="num">${r.rank_number}</span><div><div class="name">${esc(r.name)}</div><div class="meta">${esc(r.category)} · ${r.votes_count} Nennung${r.votes_count===1?'':'en'} · ${r.first_places}× Platz 1</div></div><div class="points">${r.total_points} Punkte</div></div>`).join('');
    }

    async function showResults(text){
      message(text||'');
      e.results.classList.remove('hidden');
      await loadResults();
      e.results.scrollIntoView({behavior:'smooth',block:'start'});
    }

    async function submit(){
      if(pick.length!==TOP)return message('Bitte wähle genau 5 Flammkuchen aus.');
      if(!db)throw new Error('Supabase konnte nicht geladen werden.');
      if(Date.now()-Number(localStorage.getItem(VOTED_KEY)||0)<BLOCK){e.vote.classList.add('hidden');e.menu.classList.add('hidden');return showResults('Du hast schon abgestimmt.')}
      busy=true;e.submit.textContent='Speichert ...';renderSlots();
      const p_items=pick.map((id,i)=>({flammkuchen_id:id,rank_position:i+1}));
      const {data,error}=await db.rpc('submit_flammkuchen_vote',{p_table_code:TABLE,p_session_id:session(),p_items});
      busy=false;e.submit.textContent='Absenden';renderSlots();
      if(error)throw error;
      localStorage.setItem(VOTED_KEY,String(Date.now()));
      e.vote.classList.add('hidden');e.menu.classList.add('hidden');
      await showResults(data?.ok===false?'Du hast schon abgestimmt.':'Danke! Deine Top 5 wurden gezählt.');
    }

    e.groups.addEventListener('click',ev=>{const b=ev.target.closest('[data-act]');if(!b)return;const id=Number(b.dataset.id);b.dataset.act==='add'?add(id):remove(id)});
    e.slots.addEventListener('click',ev=>{const b=ev.target.closest('[data-act]');if(!b)return;const id=Number(b.dataset.id);if(b.dataset.act==='up')move(id,-1);if(b.dataset.act==='down')move(id,1);if(b.dataset.act==='remove')remove(id)});
    e.slots.addEventListener('pointerdown',startDrag);
    e.submit.addEventListener('click',()=>submit().catch(err=>{busy=false;e.submit.textContent='Absenden';renderSlots();message(niceError(err))}));

    render();
    if(window.supabase)db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    syncMenuIds();
    if(Date.now()-Number(localStorage.getItem(VOTED_KEY)||0)<BLOCK){e.vote.classList.add('hidden');e.menu.classList.add('hidden');showResults('Du hast schon abgestimmt.').catch(err=>message(niceError(err)))}
  </script>
</body>
</html>
